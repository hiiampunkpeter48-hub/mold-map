  align-items: center;
  justify-content: center;
  text-align: center;
}

#offlineOverlay .box {
  background: white;
  padding: 20px 30px;

  line-height: 1.6;

/* ⭐ 按鈕背景流動 */
@keyframes bgFlow {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}

/* ⭐ 按鈕效果 */
.login-blink {
  /* 背景流動 */
  background: linear-gradient(
    90deg,
    #fff8cc,
    #ffd54f,
    #fff8cc
  );
  background-size: 200% 100%;
  animation: 
    bgFlow 1.2s linear infinite;


  /* 外框 */
  border: 2px solid #e6b800;

  /* 文字 */
  color: #333;
}




/* ⭐ 登出（藍色流動） */
.logout-blink {
  background: linear-gradient(
    90deg,
    #cce5ff,
    #4da3ff,
    #cce5ff
  );
  background-size: 200% 100%;
  animation: bgFlow 2s linear infinite;

  color: #003366;
}






.hidden {

/* ===== 閃三下藍色邊框 ===== */

body {

/* 📌 彈性盒子Flexbox 裡面的元素（h2、登入區、搜尋區、log） */

/* 📌 治具格子樣式 */
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.cell { border: 2px solid #666666; padding: 10px; text-align: center; cursor: pointer; user-select: none; }
.cell { background: white; }
.cell.empty { background: #f5f5f5; }
.cell.highlight {
  background-color: #9fdf9f;    /* 搜尋命中結果 */
  border-color: #FF0000;
  box-shadow: 0 0 36px rgba(255,144,144,0.9);

.cell.selected { background: #ffd966; border-color: #cc9900; }

/* 📌 搬移記錄視窗 */

  height: 480px;
  width: 680px;
  overflow: auto;
  font-size: 12px;

/* 亮綠 */

/* 白色 */

.admin { background: #eef; padding: 10px; margin-top: 10px; }

/* ===============================
   📱 手機 / 平板 響應式設計

/* 讓整體寬度不要超出畫面 */
* {
  box-sizing: border-box;

/* 字體隨螢幕縮放 */
html {
  font-size: clamp(14px, 2.5vw, 18px);

/* 搜尋框寬度改為自適應 */

}

/* dropdown 不固定寬度 */
.dropdown {
  width: 100%;

}

/* log 自動寬度 */
.log {
  width: 100%;

}

/* 手機時 grid 改成 2 欄 */
@media (max-width: 768px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .topImageGroup {
    right: 10px;
    top: 30px;
  }

    height: 60px;
  }
}

/* 超小手機改 1 欄 */
@media (max-width: 480px) {
  .grid {
    grid-template-columns: 1fr;
  }
  
  .loginRow {
    flex-direction: column;
    align-items: stretch;
  }

  input, button, select {
    width: 100%;
  }

  .searchBox {
    width: 100%;
  }
}

/* header 不要硬性橫向排列 */
header {
  flex-wrap: wrap;
}

/* 讓 board 不被撐爆 */
#board {

function showDropdown() {
  const key = searchInput.value.trim().toLowerCase();
  dropdown.innerHTML = '';

  const sorted = data.fruits
    .slice()
    .sort((a, b) =>
      a.localeCompare(b, undefined, { sensitivity: 'base' })
    );

  const matches = sorted.filter(f =>
    f.toLowerCase().includes(key)
  );

if (!matches.length) {
  dropdown.classList.add('hidden');
  arrow.textContent = "▼";
  btnText.textContent = "點擊展開_เปิด_mở";
  return;
}

  matches.forEach(f => {
    const item = document.createElement('div');
    item.textContent = f;
    item.onclick = () => {
      searchInput.value = f;
      dropdown.classList.add('hidden');
      doSearch();
    };
    dropdown.appendChild(item);
  });

  dropdown.classList.remove('hidden');

arrow.textContent = "▲";
btnText.textContent = "點擊收合_ปิด_đóng";
}

});

document.addEventListener('touchmove', e => {
  if (!isDragging) return;

function createSelector(title, items, prefixText) {

  const overlay = document.createElement('div');
  overlay.style.position = 'fixed';
  overlay.style.inset = '0';
  overlay.style.background = 'rgba(0,0,0,.5)';
  overlay.style.display = 'flex';
  overlay.style.alignItems = 'center';
  overlay.style.justifyContent = 'center';
  overlay.style.zIndex = '9999';

  const box = document.createElement('div');
  box.style.background = 'white';
  box.style.padding = '20px';
  box.style.borderRadius = '10px';
  box.style.maxHeight = '70vh';
  box.style.overflowY = 'auto';
  box.style.minWidth = '180px';


  const h = document.createElement('h3');
  h.textContent = title;
  box.appendChild(h);

  items.forEach(name => {
    const btn = document.createElement('button');
    btn.textContent = name;
    btn.style.display = 'block';
    btn.style.margin = '5px 0';
btn.style.width = '100%';

    btn.onclick = () => {
      const el = [...document.querySelectorAll('h3')]
        .find(h => h.textContent.includes(prefixText + name));

      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }

      document.body.removeChild(overlay);
      floatingMenu.classList.add('hidden');
    };

    box.appendChild(btn);
  });

  overlay.appendChild(box);
  overlay.onclick = (e)=>{
    if(e.target===overlay) document.body.removeChild(overlay);
  };

  document.body.appendChild(overlay);
}

// ===== 畫面順序的 location list =====
function getOrderedLocations(){

  const list = [];

  // rooms
  data.roomOrder.forEach(room=>{
    if(!data.rooms[room]) return;

    data.rooms[room].forEach(table=>{
      list.push(`${room}|${table}`);
    });
  });

  // boxes
  data.boxOrder.forEach(box=>{
    if(!data.boxes[box]) return;

    data.boxes[box].forEach(cell=>{
      list.push(cell);
    });
  });

  return list;
}

/* ====== 搜尋轉跳 ====== */
function scrollToResult(index) {
  const loc = searchResults[index];
  const el = document.getElementById(`cell-${loc}`);
  if (!el) return;

  // ⭐ 滾動到畫面（方式一）
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // ⭐ 閃爍效果
  el.classList.remove('blink');
  void el.offsetWidth;
  el.classList.add('blink');

  // ⭐（可選）更精準置中（方式二）
  const rect = el.getBoundingClientRect();
  const y = rect.top + window.scrollY;
}


function nextResult() {
  if (!searchResults.length) return;

  currentIndex = (currentIndex + 1) % searchResults.length;
  scrollToResult(currentIndex);
}

function prevResult() {
  if (!searchResults.length) return;

  currentIndex =
    (currentIndex - 1 + searchResults.length) % searchResults.length;

  scrollToResult(currentIndex);
}




/* ====== 新增治具 ====== */
function addFruit() {

  if (!isAdmin) return alert('請先登入管理員');

  safeInit();

  const n = prompt('新增治具名稱');
  if (!n) return;

  if (data.fruits.includes(n))
    return alert('名稱已存在');

  // ⭐ 找最後一個空位
  const emptyKey = Object.keys(data.locations)
    .reverse()
    .find(k => data.locations[k] === null);

  if (!emptyKey) return alert('目前沒有空位');

  data.fruits.push(n);
  data.locations[emptyKey] = n;

  // ⭐ 記錄新增位置
  newlyAddedLoc = emptyKey;

  // ⭐ 取消黃色選取
  selected = null;

  save();
  render();

  const el = document.getElementById(`cell-${emptyKey}`);

  if (el) {

    const rect = el.getBoundingClientRect();
    const y = rect.top + window.scrollY;

    window.scrollTo({
      top: y - window.innerHeight / 2 + rect.height / 2,
      behavior: 'smooth'
    });

    setTimeout(() => {
      newlyAddedLoc = null;
      render();
    }, 5000);

  }

}

/* ====== 刪除治具 ====== */
function removeFruit() {
  if (!isAdmin) return alert('請先登入管理員');

  if (selected) {
    const n = data.locations[selected];
    if (!n) return;

    if (!confirm(`確定刪除治具「${n}」？`)) return;

    data.fruits = data.fruits.filter(f => f !== n);
    Object.keys(data.locations).forEach(k => {
      if (data.locations[k] === n) data.locations[k] = null;
    });

    selected = null;
    save();
    render();
    return;
  }

  const n = prompt('刪除治具名稱');
  if (!data.fruits.includes(n)) return;

  data.fruits = data.fruits.filter(f => f !== n);
  Object.keys(data.locations).forEach(k => {
    if (data.locations[k] === n) data.locations[k] = null;
  });

  save();
  safeInit();
render();
}


/* ====== 修改治具名稱 ====== */
function renameFruit() {
  if (!isAdmin) return alert('請先登入管理員');

  // ⭐ 優先用目前選取的
  let oldName = null;

  if (selected) {
    oldName = data.locations[selected];
    if (!oldName) return alert('此格沒有治具');
  } else {
    oldName = prompt('輸入要修改的治具名稱');
    if (!oldName) return;
  }

  if (!data.fruits.includes(oldName)) {
    return alert('治具不存在');
  }

  const newName = prompt(`將「${oldName}」改為：`);
  if (!newName) return;

  if (data.fruits.includes(newName)) {
    return alert('新名稱已存在');
  }

  // ⭐ 更新 fruits 清單
  data.fruits = data.fruits.map(f => f === oldName ? newName : f);

  // ⭐ 更新所有位置
  Object.keys(data.locations).forEach(k => {
    if (data.locations[k] === oldName) {
      data.locations[k] = newName;
    }
  });

  // ⭐ log 紀錄
  data.log.unshift(
    `${new Date().toLocaleString()} | 治具改名 ${oldName} → ${newName} | 操作者: 管理員`
  );

  save();
  render();

  alert('修改完成');
}


// ====== 匯出完整備份 (位置 + log) ======
function exportBackup() {
  if (!isAdmin) return alert('請先登入管理員');

  const layout = {};
  Object.entries(data.locations).forEach(([loc, fruit]) => {
    if (fruit) layout[loc] = fruit;
  });

  const backup = {
    layout: layout,
    log: data.log || [],
    exportTime: new Date().toLocaleString()
  };

  const blob = new Blob(
    [JSON.stringify(backup, null, 2)],
    { type: 'application/json;charset=utf-8;' }
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tool_backup.json';

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ====== 匯入完整備份 ======
function importBackup() {
  if (!isAdmin) return alert('請先登入管理員');

  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';

  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      try {
        const imported = JSON.parse(e.target.result);

        if (!confirm('匯入會覆蓋目前所有治具位置與記錄，確定繼續？')) return;

        // ✅ 先清空
        data.fruits = [];
        data.locations = {};
        data.log = [];

        // ✅ 還原位置
        if (imported.layout) {
          Object.entries(imported.layout).forEach(([loc, fruit]) => {
            data.locations[loc] = fruit;
            if (!data.fruits.includes(fruit)) data.fruits.push(fruit);
          });
        }

        // ✅ 還原 log
        if (Array.isArray(imported.log)) data.log = imported.log;

        // ⭐ 補齊缺少 key（safeInit 會確保所有房間 / box 都有 key）
        safeInit();

        // 加入一筆匯入紀錄
        data.log.unshift(
          `${new Date().toLocaleString()} | 匯入完整備份 | 操作者: 管理員`
        );

        save();
        render();
        alert('完整備份匯入完成');

      } catch (err) {
        alert('檔案格式錯誤，請確認為正確的 JSON');
      }
    };

    reader.readAsText(file);
  };

  input.click();
}

d.onclick = () => select(locKey);

// ================= 新增管理員改名功能 =================
function editNames(){
  if(!isAdmin) return alert('請先登入管理員');
  const choice = prompt('改名選擇:\n1- Room\n2- Table\n3- Box\n4- Box內小框');
  if(!choice) return;
  if(choice==='1'){ // Room
    const oldName = prompt('輸入原 Room 名稱'); if(!oldName||!data.rooms[oldName]) return alert('不存在');
    const newName = prompt('輸入新 Room 名稱'); if(!newName) return;
    if(data.rooms[newName]) return alert('名稱已存在');
    data.rooms[newName]=data.rooms[oldName]; delete data.rooms[oldName];
    const idx = data.roomOrder.indexOf(oldName); if(idx>=0) data.roomOrder[idx]=newName;
    Object.keys(data.locations).forEach(k=>{
      if(k.startsWith(oldName+'|')){
        const t = k.split('|')[1];
        data.locations[`${newName}|${t}`]=data.locations[k];
        delete data.locations[k];
      }
    });
    data.log.unshift(`${new Date().toLocaleString()} | Room ${oldName} → ${newName} | 操作者: 管理員`);
    save(); render(); alert('Room 名稱已修改'); return;
  }
  if(choice==='2'){ // Table
    const roomName = prompt('輸入 Table 所在 Room 名稱'); if(!roomName||!data.rooms[roomName]) return alert('Room 不存在');
    const oldTable = prompt('輸入原 Table 名稱'); if(!oldTable||!data.rooms[roomName].includes(oldTable)) return alert('Table 不存在');
    const newTable = prompt('輸入新 Table 名稱'); if(!newTable) return;
    const idx = data.rooms[roomName].indexOf(oldTable); data.rooms[roomName][idx]=newTable;
    const oldKey = `${roomName}|${oldTable}`;
    const newKey = `${roomName}|${newTable}`;
    data.locations[newKey]=data.locations[oldKey]; delete data.locations[oldKey];
    data.log.unshift(`${new Date().toLocaleString()} | Table ${oldKey} → ${newKey} | 操作者: 管理員`);
    save(); render(); alert('Table 名稱已修改'); return;
  }
  if(choice==='3'){ // Box
    const oldBox = prompt('輸入原 Box 名稱'); if(!oldBox||!data.boxes[oldBox]) return alert('Box 不存在');
    const newBox = prompt('輸入新 Box 名稱'); if(!newBox) return;
    data.boxes[newBox]=data.boxes[oldBox]; delete data.boxes[oldBox];
    const idx = data.boxOrder.indexOf(oldBox); if(idx>=0) data.boxOrder[idx]=newBox;
    Object.keys(data.locations).forEach(k=>{
      if(k===oldBox){ data.locations[newBox]=data.locations[oldBox]; delete data.locations[oldBox]; }
    });
    data.log.unshift(`${new Date().toLocaleString()} | Box ${oldBox} → ${newBox} | 操作者: 管理員`);
    save(); render(); alert('Box 名稱已修改'); return;
  }
  if(choice==='4'){ // Box 小框
    const boxName = prompt('輸入所在 Box 名稱'); if(!boxName||!data.boxes[boxName]) return alert('Box 不存在');
    const oldCell = prompt('輸入原小框名稱'); if(!oldCell||!data.boxes[boxName].includes(oldCell)) return alert('小框不存在');
    const newCell = prompt('輸入新小框名稱'); if(!newCell) return;
    const idx = data.boxes[boxName].indexOf(oldCell); data.boxes[boxName][idx]=newCell;
    if(data.locations[oldCell]!==undefined){ data.locations[newCell]=data.locations[oldCell]; delete data.locations[oldCell]; }
    data.log.unshift(`${new Date().toLocaleString()} | Box內小框 ${oldCell} → ${newCell} | 操作者: 管理員`);
    save(); render(); alert('小框名稱已修改'); return;
  }
}

    "E251":["工作桌_1","工作桌_2","工作桌_3","工作桌_4"]
  };

  const DEFAULT_BOXES = {
    "Z區_1F_or_3F":[
      "Z1","Z2","Z3","Z4","Z5","Z6","Z7","Z8",
      "Z9","Z10","Z11","Z12","Z13","Z14","Z15","Z16",
      "Z17","Z18","Z19","Z20","Z21","Z22","Z23","Z24",
      "Z25","Z26","Z27","Z28","Z29","Z30","Z31","Z32",
      "Z33","Z34","Z35","Z36","Z37","Z38","Z39","Z40",
      "Z41","Z42","Z43","Z44","Z45","Z46","Z47","Z48",
      "Z49","Z50","Z51","Z52","Z53","Z54","Z55","Z56",
      "Z57","Z58","Z59","Z60","Z61","Z62","Z63","Z64"
    ]
  };

  const DEFAULT_ROOM_ORDER = Object.keys(DEFAULT_ROOMS);

  const DEFAULT_BOX_ORDER = [
    "A區","B區","C區","D區","E區","F區",
    "G區","H區","J區","W區","X區","Y區","Z區_1F_or_3F"
  ];

  // ========= ⭐ 補 rooms =========
  Object.keys(DEFAULT_ROOMS).forEach(r=>{
    if(!data.rooms[r]){
      data.rooms[r] = DEFAULT_ROOMS[r];
    }
  });

  // ========= ⭐ 補 boxes（重點） =========
  Object.keys(DEFAULT_BOXES).forEach(b=>{
    if(!data.boxes[b]){
      data.boxes[b] = DEFAULT_BOXES[b];
    }
  });

  // ========= ⭐ 修正 order =========
  data.roomOrder = DEFAULT_ROOM_ORDER.filter(r=>data.rooms[r]);
  Object.keys(data.rooms).forEach(r=>{
    if(!data.roomOrder.includes(r)) data.roomOrder.push(r);
  });

  data.boxOrder = DEFAULT_BOX_ORDER.filter(b=>data.boxes[b]);
  Object.keys(data.boxes).forEach(b=>{
    if(!data.boxOrder.includes(b)) data.boxOrder.push(b);
  });

  // ========= ⭐ 補齊 locations =========
  data.roomOrder.forEach(room=>{
    data.rooms[room].forEach(table=>{
      const key = `${room}|${table}`;
      if(!(key in data.locations)){
        data.locations[key] = null;
      }
    });
  });

  Object.values(data.boxes).flat().forEach(cell=>{
    if(!(cell in data.locations)){
      data.locations[cell] = null;
    }
  });

  // ========= ⭐ 清理孤兒 =========
  const valid = new Set();

  data.roomOrder.forEach(room=>{
    data.rooms[room].forEach(table=>{
      valid.add(`${room}|${table}`);
    });
  });

  Object.values(data.boxes).flat().forEach(c=>valid.add(c));

  Object.keys(data.locations).forEach(loc=>{
    if(!valid.has(loc)){
      delete data.locations[loc];
    }
  });





  let changed = false;

  if(!data.boxes){
    data.boxes = {};
    changed = true;
  }

  // ⭐ 補 Z區
  if(!data.boxes["Z區_1F_or_3F"]){
    data.boxes["Z區_1F_or_3F"] = DEFAULT_BOXES["Z區_1F_or_3F"];
    changed = true;
  }

  // ⭐ 補 Z1~Z64
  const cells = data.boxes["Z區_1F_or_3F"];
  DEFAULT_BOXES["Z區_1F_or_3F"].forEach(c=>{
    if(!cells.includes(c)){
      cells.push(c);
      changed = true;
    }
  });

  return changed; // ⭐ 回傳是否有修改
}










// ================= 渲染 =================
function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // 畫 room
  data.roomOrder.forEach(r => {
    if(!data.rooms[r]) return;
    const div = document.createElement('div');
    div.className = 'room';
    div.innerHTML = `<h3>機台 ${r}</h3><div class="grid"></div>`;
    const grid = div.querySelector('.grid');

    data.rooms[r].forEach(t => {
      const key = `${r}|${t}`;
      grid.appendChild(cell(key, t));
    });

    board.appendChild(div);
  });

  // 畫 boxes
  data.boxOrder.forEach(group => {
    if(!data.boxes[group]) return;
    const div = document.createElement('div');
    div.className = `boxes ${group}`;
    div.innerHTML = `<h3>治具架 ${group}</h3><div class="grid"></div>`;
    const grid = div.querySelector('.grid');

    data.boxes[group].forEach(b => {
      grid.appendChild(cell(b, b));
    });

    board.appendChild(div);
  });

    // ✅ 改成這行
  renderLog();

}

// ================= 依操作交替顏色 =================
function renderLog(){

  const logDiv = document.getElementById("log");
  logDiv.innerHTML = "";

  let lastTime = null;
  let operationIndex = -1;

  data.log.forEach(line => {

    // 取出時間（| 前面的部分）
    const time = line.split("|")[0].trim();

    // 如果時間改變 → 代表新操作
    if(time !== lastTime){
      operationIndex++;
      lastTime = time;
    }

    const div = document.createElement("div");
    div.classList.add("logLine");

    if(operationIndex % 2 === 0){
      div.classList.add("logGreen");
    } else {
      div.classList.add("logWhite");
    }

    div.textContent = line;
    logDiv.appendChild(div);
  });
  // ❌ 不要自動滾動 → 保持原本位置
  // logDiv.scrollTop = logDiv.scrollHeight;
}
